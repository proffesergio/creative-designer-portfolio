name: Deploy to cPanel (Custom Server)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify VIDEO_BASE_URL is set
        run: |
          if [ -z "${{ secrets.VIDEO_BASE_URL }}" ]; then
            echo "ERROR: VIDEO_BASE_URL secret is not set! Please recheck!"
            exit 1
          fi
          echo "VIDEO_BASE_URL prefix: ${{ secrets.VIDEO_BASE_URL }}"

      - name: Build Next.js app
        run: npm run build        
        env:
          NODE_ENV: production          
          NEXT_PUBLIC_VIDEO_BASE_URL: ${{ secrets.VIDEO_BASE_URL }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Prune node_modules to production only (critical step!)
        run: npm prune --production

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          # Copy built Next.js app          cp -r .next deploy/
          cp -r public deploy/
          # Copy PRUNED production node_modules (this fixes your error!)
          cp -r node_modules deploy/
          # Copy your custom server.js
          cp server.js deploy/
          # Copy package.json (optional but harmless)
          cp package.json deploy/
          # Copy environment file for your custom server (if using dotenv)
          [ -f .env.production ] && cp .env.production deploy/.env
          [ -f .env ] && cp .env deploy/.env

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          local-dir: deploy/
          server-dir: ${{ secrets.CPANEL_REMOTE_PATH }}/
          log-level: verbose