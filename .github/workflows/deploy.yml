name: Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify VIDEO_BASE_URL is set
        run: |
          if [ -z "${{ secrets.VIDEO_BASE_URL }}" ]; then
            echo "ERROR: VIDEO_BASE_URL secret is not set! Please recheck!"
            exit 1
          fi
          echo "VIDEO_BASE_URL prefix: ${{ secrets.VIDEO_BASE_URL }}"

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_VIDEO_BASE_URL: ${{ secrets.VIDEO_BASE_URL }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp start.js deploy/
          echo "NODE_ENV=production" > deploy/.env
          echo "NEXT_PUBLIC_VIDEO_BASE_URL=${{ secrets.VIDEO_BASE_URL }}" >> deploy/.env
          echo "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}" >> deploy/.env

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          local-dir: deploy/
          server-dir: ${{ secrets.CPANEL_REMOTE_PATH }}/
          log-level: verbose
          clear-ignore: true
