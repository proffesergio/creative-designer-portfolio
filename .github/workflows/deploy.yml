name: Deploy to cPanel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Create deploy package
        run: |
          mkdir -p deploy
          cp -r .next/standalone deploy/
          cp -r .next/static deploy/standalone/
          cp -r public deploy/standalone/
          cp -r package*.json deploy/standalone/
          cp -r .next/server deploy/standalone/
          cd deploy
          tar -czf ../deploy.tar.gz .
      
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          local-dir: deploy/standalone/
          remote-dir: ${{ secrets.CPANEL_REMOTE_PATH }}